[alembic]
script_location = backend/migrations
prepend_sys_path = backend
path_separator = os
# Die tatsächliche URL wird in migrations/env.py aus app.config.settings geladen.
sqlalchemy.url = postgresql+asyncpg://prowin:prowin_dev@localhost:5432/prowin

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
